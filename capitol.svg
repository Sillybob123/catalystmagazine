<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Main Capitol Dome -->
  <g id="dome">
    <!-- Dome Base -->
    <ellipse cx="400" cy="200" rx="85" ry="25" fill="#E8EDF5" stroke="#B0BDD1" stroke-width="2"/>

    <!-- Dome Body -->
    <path d="M 315 200 Q 315 120 400 90 Q 485 120 485 200" fill="#F3F6FA" stroke="#B0BDD1" stroke-width="2"/>
    <path d="M 315 200 Q 315 120 400 90 Q 485 120 485 200" fill="url(#domeGradient)"/>

    <!-- Dome Detail Lines -->
    <path d="M 330 195 Q 330 130 400 105" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>
    <path d="M 345 198 Q 345 138 400 115" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>
    <path d="M 360 199 Q 360 145 400 122" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>
    <path d="M 470 195 Q 470 130 400 105" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>
    <path d="M 455 198 Q 455 138 400 115" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>
    <path d="M 440 199 Q 440 145 400 122" stroke="#D1DAE8" stroke-width="1.5" fill="none"/>

    <!-- Dome Top -->
    <circle cx="400" cy="90" r="12" fill="#D1DAE8" stroke="#9BA9BE" stroke-width="2"/>

    <!-- Flag Pole -->
    <line x1="400" y1="90" x2="400" y2="55" stroke="#8B95A8" stroke-width="3"/>
    <path d="M 400 55 L 425 60 L 400 65 Z" fill="#C73E3A" stroke="#A12E2B" stroke-width="1"/>

    <!-- Dome Windows -->
    <rect x="385" y="140" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
    <rect x="407" y="140" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
    <rect x="370" y="155" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
    <rect x="422" y="155" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
    <rect x="358" y="170" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
    <rect x="434" y="170" width="8" height="15" rx="4" fill="#8B95A8" opacity="0.6"/>
  </g>

  <!-- Rotunda Drum -->
  <g id="rotunda">
    <rect x="315" y="200" width="170" height="80" fill="#F8FAFC" stroke="#B0BDD1" stroke-width="2"/>
    <rect x="315" y="200" width="170" height="80" fill="url(#buildingGradient)"/>

    <!-- Columns -->
    <rect x="325" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="345" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="365" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="385" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="405" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="425" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="445" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="465" y="210" width="12" height="65" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
  </g>

  <!-- Senate Wing (Left) -->
  <g id="senate-wing">
    <!-- Main Building -->
    <rect x="120" y="280" width="195" height="160" fill="#F8FAFC" stroke="#B0BDD1" stroke-width="2"/>
    <rect x="120" y="280" width="195" height="160" fill="url(#buildingGradient)"/>

    <!-- Pediment -->
    <path d="M 115 280 L 217.5 240 L 320 280 Z" fill="#E8EDF5" stroke="#B0BDD1" stroke-width="2"/>

    <!-- Columns -->
    <rect x="135" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="165" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="195" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="225" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="255" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="285" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>

    <!-- Windows -->
    <rect x="140" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="170" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="200" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="230" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="260" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>

    <rect x="140" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="170" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="200" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="230" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="260" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>

    <rect x="140" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="170" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="200" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="230" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="260" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
  </g>

  <!-- House Wing (Right) -->
  <g id="house-wing">
    <!-- Main Building -->
    <rect x="485" y="280" width="195" height="160" fill="#F8FAFC" stroke="#B0BDD1" stroke-width="2"/>
    <rect x="485" y="280" width="195" height="160" fill="url(#buildingGradient)"/>

    <!-- Pediment -->
    <path d="M 480 280 L 582.5 240 L 685 280 Z" fill="#E8EDF5" stroke="#B0BDD1" stroke-width="2"/>

    <!-- Columns -->
    <rect x="500" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="530" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="560" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="590" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="620" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>
    <rect x="650" y="300" width="14" height="140" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1.5"/>

    <!-- Windows -->
    <rect x="505" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="535" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="565" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="595" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="625" y="310" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>

    <rect x="505" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="535" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="565" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="595" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="625" y="350" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>

    <rect x="505" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="535" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="565" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="595" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="625" y="390" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
  </g>

  <!-- Center Connecting Building -->
  <g id="center-building">
    <rect x="315" y="280" width="170" height="160" fill="#F8FAFC" stroke="#B0BDD1" stroke-width="2"/>
    <rect x="315" y="280" width="170" height="160" fill="url(#buildingGradient)"/>

    <!-- Central Entrance -->
    <rect x="365" y="360" width="70" height="80" fill="#D1DAE8" stroke="#B0BDD1" stroke-width="2"/>
    <path d="M 365 360 L 400 330 L 435 360 Z" fill="#E8EDF5" stroke="#B0BDD1" stroke-width="2"/>

    <!-- Entrance Columns -->
    <rect x="370" y="365" width="8" height="75" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1"/>
    <rect x="385" y="365" width="8" height="75" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1"/>
    <rect x="407" y="365" width="8" height="75" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1"/>
    <rect x="422" y="365" width="8" height="75" fill="#E1E8F0" stroke="#B0BDD1" stroke-width="1"/>

    <!-- Door -->
    <rect x="390" y="400" width="20" height="40" rx="1" fill="#6B7280" stroke="#4B5563" stroke-width="1.5"/>

    <!-- Side Windows -->
    <rect x="325" y="300" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="325" y="340" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="325" y="380" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>

    <rect x="457" y="300" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="457" y="340" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
    <rect x="457" y="380" width="18" height="28" rx="2" fill="#8B95A8" opacity="0.5"/>
  </g>

  <!-- Base/Foundation -->
  <rect x="100" y="440" width="600" height="15" fill="#CED7E3" stroke="#B0BDD1" stroke-width="2"/>

  <!-- Steps -->
  <rect x="340" y="455" width="120" height="8" fill="#B8C5D6" stroke="#9BA9BE" stroke-width="1"/>
  <rect x="350" y="463" width="100" height="8" fill="#A8B6C8" stroke="#8B95A8" stroke-width="1"/>
  <rect x="360" y="471" width="80" height="8" fill="#98A7BA" stroke="#7A8799" stroke-width="1"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="domeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#E8EDF5;stop-opacity:0.6" />
    </linearGradient>

    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E1E8F0;stop-opacity:0.4" />
    </linearGradient>
  </defs>
</svg>
