<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | The Catalyst Magazine</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1d1d1f;
        }

        /* ── Card ── */
        .login-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 12px 48px rgba(0,0,0,0.08);
            padding: 52px 48px 44px;
            width: 100%;
            max-width: 420px;
        }

        /* ── Logo + header ── */
        .login-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }
        .login-logo img {
            width: 52px;
            height: auto;
        }
        .login-title {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        .login-sub {
            font-size: 0.875rem;
            color: #6e6e73;
            text-align: center;
            margin-bottom: 36px;
            line-height: 1.5;
        }

        /* ── Form views ── */
        .view { display: none; }
        .view.active { display: block; }

        /* ── Fields ── */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #1d1d1f;
            margin-bottom: 7px;
        }
        .input-wrap { position: relative; }
        .field input {
            width: 100%;
            padding: 13px 16px;
            font-size: 0.97rem;
            font-family: inherit;
            border: 1.5px solid #d2d2d7;
            border-radius: 12px;
            background: #fafafa;
            color: #1d1d1f;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .field input:focus {
            outline: none;
            border-color: #1d1d1f;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(29,29,31,0.08);
        }
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6366f1;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .caps-warn {
            font-size: 0.75rem;
            color: #dc2626;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        /* ── Forgot password link ── */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6366f1;
            text-decoration: none;
            margin-top: -8px;
            margin-bottom: 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 100px;
            border: none;
            background: #1d1d1f;
            color: #fff;
            font-size: 0.97rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 4px;
        }
        .btn-submit:hover { opacity: 0.85; transform: scale(0.99); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Alerts ── */
        .alert {
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 18px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #047857; border: 1px solid #bbf7d0; }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #6e6e73;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            margin-bottom: 24px;
            padding: 0;
        }
        .back-link:hover { color: #1d1d1f; }

        /* ── Footer note ── */
        .login-footer {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #8e8e93;
            text-align: center;
            line-height: 1.6;
        }
        .login-footer a {
            color: #6366f1;
            font-weight: 600;
            text-decoration: none;
        }
        .login-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 40px 28px 36px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="/NewLogoShape.png" alt="The Catalyst Magazine">
        </div>
        <h1 class="login-title">Staff Login</h1>
        <p class="login-sub">Sign in to the editorial workspace.<br>Staff accounts only.</p>

        <!-- ── Sign-in view ── -->
        <div class="view active" id="view-login">
            <div class="alert alert-error" id="login-error"></div>

            <form id="login-form" novalidate>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="toggle-pw" tabindex="-1">Show</button>
                    </div>
                    <div class="caps-warn" id="caps-warn">Caps Lock is on</div>
                </div>

                <button type="button" class="forgot-link" id="show-reset">Forgot password?</button>

                <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
            </form>

            <p class="login-footer">
                No account? <a href="mailto:stemcatalystmagazine@gmail.com?subject=Editorial%20Access%20Request">Request access</a>
            </p>
        </div>

        <!-- ── Password reset view ── -->
        <div class="view" id="view-reset">
            <button type="button" class="back-link" id="back-to-login">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
                Back to sign in
            </button>

            <div class="alert alert-error" id="reset-error"></div>
            <div class="alert alert-success" id="reset-success"></div>

            <form id="reset-form" novalidate>
                <div class="field">
                    <label for="reset-email">Email address</label>
                    <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <button type="submit" class="btn-submit" id="reset-btn">Send Reset Link</button>
            </form>

            <p class="login-footer" style="margin-top: 20px;">
                We'll send a password reset link to your staff email. Only authorized accounts can receive one.
            </p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '/js/firebase-config.js';
        import {
            signInWithEmailAndPassword,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ── Element refs ──
        const viewLogin   = document.getElementById('view-login');
        const viewReset   = document.getElementById('view-reset');
        const loginForm   = document.getElementById('login-form');
        const resetForm   = document.getElementById('reset-form');
        const emailInput  = document.getElementById('email');
        const pwInput     = document.getElementById('password');
        const togglePwBtn = document.getElementById('toggle-pw');
        const capsWarn    = document.getElementById('caps-warn');
        const loginError  = document.getElementById('login-error');
        const resetError  = document.getElementById('reset-error');
        const resetSuccess= document.getElementById('reset-success');
        const loginBtn    = document.getElementById('login-btn');
        const resetBtn    = document.getElementById('reset-btn');

        // ── Restore remembered email ──
        const stored = localStorage.getItem('editorialLastEmail');
        if (stored) emailInput.value = stored;

        // ── Show / hide password ──
        togglePwBtn.addEventListener('click', () => {
            const hidden = pwInput.type === 'password';
            pwInput.type = hidden ? 'text' : 'password';
            togglePwBtn.textContent = hidden ? 'Hide' : 'Show';
            pwInput.focus();
        });

        // ── Caps Lock warning ──
        ['keyup', 'keydown'].forEach(ev => {
            pwInput.addEventListener(ev, e => {
                capsWarn.style.display = e.getModifierState?.('CapsLock') ? 'block' : 'none';
            });
        });

        // ── View switching ──
        document.getElementById('show-reset').addEventListener('click', () => {
            const prefill = emailInput.value.trim();
            if (prefill) document.getElementById('reset-email').value = prefill;
            switchView('reset');
        });
        document.getElementById('back-to-login').addEventListener('click', () => switchView('login'));

        function switchView(name) {
            viewLogin.classList.toggle('active', name === 'login');
            viewReset.classList.toggle('active', name === 'reset');
            clearAlerts();
        }

        // ── Login ──
        loginForm.addEventListener('submit', async e => {
            e.preventDefault();
            clearAlerts();

            const email    = emailInput.value.trim();
            const password = pwInput.value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in…';

            try {
                localStorage.setItem('editorialLastEmail', email);

                const cred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', cred.user.uid));

                if (!userDoc.exists()) throw new Error('Account not found. Contact your administrator.');

                const data = userDoc.data();
                const allowedRoles = ['writer', 'editor', 'admin', 'newsletter_builder', 'marketing'];

                if (!data.role || !allowedRoles.includes(data.role))
                    throw new Error('Your account does not have the required permissions.');

                if (data.status === 'pending' || data.status === 'disabled')
                    throw new Error('Your account is pending activation. Contact your administrator.');

                window.location.href = '/admin';

            } catch (err) {
                showAlert(loginError, friendlyError(err));
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // ── Password reset ──
        resetForm.addEventListener('submit', async e => {
            e.preventDefault();
            clearAlerts();

            const email = document.getElementById('reset-email').value.trim();
            if (!email) { showAlert(resetError, 'Please enter your email address.'); return; }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Sending…';

            try {
                await sendPasswordResetEmail(auth, email);
                showAlert(resetSuccess, 'Reset link sent — check your inbox (and spam folder).');
                resetForm.reset();
            } catch (err) {
                showAlert(resetError, friendlyError(err));
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Send Reset Link';
            }
        });

        // ── Helpers ──
        function showAlert(el, msg) {
            el.textContent = msg;
            el.classList.add('show');
        }

        function clearAlerts() {
            [loginError, resetError, resetSuccess].forEach(el => {
                el.textContent = '';
                el.classList.remove('show');
            });
        }

        function friendlyError(err) {
            const map = {
                'auth/invalid-email':           'Invalid email address.',
                'auth/user-disabled':           'This account has been disabled.',
                'auth/user-not-found':          'No account found with this email.',
                'auth/wrong-password':          'Incorrect password.',
                'auth/invalid-credential':      'Incorrect email or password.',
                'auth/too-many-requests':       'Too many attempts. Please wait a moment and try again.',
                'auth/network-request-failed':  'Network error. Check your connection.',
            };
            return map[err.code] || err.message || 'Something went wrong. Please try again.';
        }

        // ── Already signed in? ──
        auth.onAuthStateChanged(async user => {
            if (!user) return;
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) window.location.href = '/admin';
        });
    </script>
</body>
</html>
