<header class="editorial-header">
    <div class="editorial-shell minimal compact">
        <div class="editorial-brand compact">
            <a href="/admin-dashboard.html" class="editorial-logo" aria-label="Go to dashboard">
                <img src="/NewLogoShape.png" alt="Catalyst">
            </a>
            <span class="editorial-logo-text">Editor</span>
            <span class="editorial-status ok"><span class="dot"></span>Online</span>
        </div>
        <div class="editorial-meta">
            <a href="/editorial-studio.html" class="editorial-link">Open Studio</a>
            <a href="/admin-dashboard.html" class="editorial-link">Dashboard</a>
            <a href="mailto:stemcatalystmagazine@gmail.com?subject=Editorial%20Support" class="editorial-link">Support</a>
            <div class="autosave-indicator requires-editor" id="autosave-indicator">
                <span class="autosave-dot"></span>
                <span class="autosave-text">Not saved</span>
            </div>
            <div class="user-dropdown requires-auth">
                <button class="user-menu-btn" id="user-menu-btn" type="button">
                    <div class="user-avatar" id="user-avatar">--</div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="user-dropdown-menu" id="user-dropdown-menu">
                    <div class="dropdown-user-info">
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-role" id="user-role">WRITER</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" id="logout-btn" type="button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
