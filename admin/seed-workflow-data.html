function prepareProject(p) {
  const { id, activity, createdAt, updatedAt, lastActivity, ...rest } = p;
  return {
    ...rest,
    createdAt: ts(createdAt),
    updatedAt: ts(updatedAt),
    lastActivity: ts(lastActivity),
    activity: activity.map(a => ({ ...a, timestamp: ts(a.timestamp) })),
  };
}
