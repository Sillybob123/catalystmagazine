    <div id="site-header"></div>

    <main class="an-main">
        <!-- Cinematic Hero -->
        <section class="an-hero" id="an-hero">
            <div class="an-hero-backdrop" id="an-hero-backdrop" aria-hidden="true"></div>
            <div class="an-hero-scrim" aria-hidden="true"></div>
            <div class="an-hero-noise" aria-hidden="true"></div>

            <div class="an-hero-inner">
                <h1 class="an-hero-title">
                    <span class="an-line">Stories that</span>
                    <span class="an-line an-italic">move science</span>
                    <span class="an-line">forward.</span>
                </h1>

                <p class="an-hero-kicker">
                    A living archive of features, profiles, interviews and editorials
                    from the Nation's Capital.
                </p>

            </div>

            <a href="#an-feed" class="an-scroll-caret" aria-label="Scroll to stories">
                <span class="an-scroll-caret-label">Explore</span>
                <svg class="an-scroll-caret-icon" width="22" height="12" viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2 2l9 8 9-8"/>
                </svg>
            </a>
        </section>

        <!-- Cover Spotlight -->
        <section class="an-spotlight-section" id="an-spotlight-section">
            <div class="an-container">
                <div class="an-section-head">
                    <span class="an-kicker">Editor's Pick</span>
                    <h2 class="an-section-title">On the cover</h2>
                </div>
                <article class="an-spotlight" id="an-spotlight" aria-busy="true">
                    <div class="an-spotlight-skel"></div>
                </article>
            </div>
        </section>

        <!-- Sticky Filter Rail -->
        <section class="an-filter-rail" id="an-filter-rail">
            <div class="an-container an-filter-inner">
                <div class="an-pill-group" role="tablist" aria-label="Filter stories by category">
                    <span class="an-pill-indicator" id="an-pill-indicator" aria-hidden="true"></span>
                    <button class="an-pill active" data-category="all" role="tab" aria-selected="true">All</button>
                    <button class="an-pill" data-category="feature" role="tab" aria-selected="false">Features</button>
                    <button class="an-pill" data-category="profile" role="tab" aria-selected="false">Profiles</button>
                    <button class="an-pill" data-category="interview" role="tab" aria-selected="false">Interviews</button>
                    <button class="an-pill" data-category="editorial" role="tab" aria-selected="false">Editorials</button>
                </div>

                <label class="an-search">
                    <svg class="an-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="search" id="an-search-input" placeholder="Search stories…" autocomplete="off" spellcheck="false">
                    <button type="button" class="an-search-clear" id="an-search-clear" aria-label="Clear search" hidden>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </label>
            </div>
        </section>

        <!-- Story Feed -->
        <section class="an-feed-section" id="an-feed">
            <div class="an-container">
                <div class="an-feed" id="an-feed-grid" aria-live="polite">
                    <!-- Rendered by JS -->
                </div>

                <div class="an-empty" id="an-empty" hidden>
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <h3>No stories found</h3>
                    <p>Try a different search term or category.</p>
                </div>

                <div class="an-loadmore-wrap">
                    <button class="an-loadmore" id="an-loadmore" hidden>
                        <span>Show more stories</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
