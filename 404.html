<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | The Catalyst Magazine</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f8f6;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .error-image {
            width: min(600px, 90vw);
            height: auto;
            display: block;
            margin: 0 auto 40px;
        }

        .error-message {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: #6e6e73;
            max-width: 440px;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            color: #fff;
            text-decoration: none;
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }

        .home-link {
            margin-top: 24px;
            font-size: 0.88rem;
            color: #6e6e73;
        }
        .home-link a {
            color: #0f172a;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
    </style>
</head>
<body>
    <img src="/404Error.webp" alt="404" class="error-image">
    <p class="error-message">This page doesn't exist — or it moved somewhere else. Let's get you back on track.</p>
    <a href="/" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Back to Home
    </a>
    <p class="home-link">Or browse our <a href="/articles">latest articles</a></p>
</body>
</html>
